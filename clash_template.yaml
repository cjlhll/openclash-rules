# With https://blog.tyasaka.xyz/
# 作者Telegram:  @christine_tys
mixed-port: 7890
redir-port: 7891
tproxy-port: 1536
allow-lan: true
mode: rule
geodata-mode: true
geodata-loader: standard
unified-delay: true
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
tcp-concurrent: true
enable-process: true
find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-interval: 30
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/country.mmdb"
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
tun:
  enable: false
  device: MihomoCore
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  prefer-h3: true
  use-system-hosts: true
  listen: 0.0.0.0:5053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter:
    - "+.lan"
    - "connect.rom.miui.com"
    - "+.miwifi.com"
    - "+.ntp.org"
    - "+.u-tools.cn"
    - "+.mediatek.com"
    - "+.cfprefer1.xyz"
    - "+.wetab.link"
    - "+.tyasaka.xyz"
    # QQ
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    # WeChat
    - "localhost.work.weixin.qq.com"
    - "+.weixin.qq.com"
    - "+.wechat.com"
    # Windows
    - "time.windows.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.wpsmail.net"
    - "+.henzanapp.com"
    - "+.pconline.com.cn"
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  proxy-server-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - tls://1.0.0.1:853
    - tls://dns.google:853

# 处理代理集合:ipv6优先案例
  p: &p
    {type: http, udp: true, ip-version: ipv6-prefer, smux: {enable: true}}
    
#	订阅组合
  u: &u
    use:
    - 1.provider1
    - 2.provider2

proxy-providers:
  1.provider1:
    <<: *p  
    type: http
# 节点文件 p1对应provider1
    path: ./proxy_provider/p1.yaml
# 订阅 链接
    url: https://hongxingdl.love/hxvip?token=eefd5d29f9375c9010dc770128c72043
# 自动更新时间 21600(秒) / 3600 = 6小时
    interval: 21600
    filter: "香港|日本|新加坡|美国" # 添加筛选规则
    exclude-filter: "IPV6"
# 节点名称前缀 p1
    override:
      additional-prefix: "红杏 |"
      
  2.provider2:
    <<: *p
    type: http
    path: ./proxy_provider/p2.yaml
    url: https://sub.xfltd.bond/api/v1/client/subscribe?token=3b98f3b790be8b58471c033fa24b9ba0
    interval: 21600
    filter: "香港|日本|新加坡|美国" # 添加筛选规则
    exclude-filter: "IPV6"
    override:
      additional-prefix: "XFSS |"

proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: [♻️ 自动选择], <<: *u}
   # 自动选择案例
  - {name: ♻️ 自动选择, type: url-test, interval: 180, url: 'https://cp.cloudflare.com/generate_204', proxies: [], <<: *u}
  - {name: 🎥 Netflix, type: select, proxies: [🚀 节点选择,♻️ 自动选择], <<: *u}
  - {name: 🤖 ChatGPT, type: select, proxies: [🚀 节点选择,♻️ 自动选择], <<: *u}
  - {name: 🎯 全球直连, type: select, proxies: [DIRECT,🚀 节点选择,♻️ 自动选择]}
  - {name: 🛑 全球拦截, type: select, proxies: [REJECT,DIRECT]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 节点选择,🎯 全球直连,♻️ 自动选择], <<: *u}

rules:
  - RULE-SET,Reject,🛑 全球拦截
  - RULE-SET,Direct,🎯 全球直连
  - RULE-SET,private,🎯 全球直连
  - RULE-SET,icloud,🎯 全球直连
  - RULE-SET,apple,🎯 全球直连
  - RULE-SET,google,🚀 节点选择
  - RULE-SET,OpenAI,🤖 ChatGPT
  - RULE-SET,SteamCN,🎯 全球直连
  - RULE-SET,Netflix,🎥 Netflix
  - RULE-SET,Netflix_IP,🎥 Netflix
  - RULE-SET,proxy,🚀 节点选择
  - RULE-SET,direct,🎯 全球直连
  - RULE-SET,lancidr,🎯 全球直连
  - RULE-SET,cncidr,🎯 全球直连
  - RULE-SET,telegramcidr,🚀 节点选择
  - GEOIP,LAN,🎯 全球直连,no-resolve
  - GEOIP,CN,🎯 全球直连,no-resolve
  - GEOSITE,CN,🎯 全球直连
  - MATCH,🐟 漏网之鱼
rule-providers:
  Reject:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/cjlhll/openclash-rules/refs/heads/main/Reject.yaml
    path: ./providers/rule-provider_Reject.yaml
    interval: 86400
  Direct:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/cjlhll/openclash-rules/refs/heads/main/Direct.yaml
    path: ./providers/rule-provider_Direct.yaml
    interval: 86400
  private:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt
    path: ./providers/rule-provider_private.yaml
    interval: 86400
  icloud:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt
    path: ./providers/rule-provider_icloud.yaml
    interval: 86400
  apple:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
    path: ./providers/rule-provider_apple.yaml
    interval: 86400
  google:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt
    path: ./providers/rule-provider_google.yaml
    interval: 86400
  OpenAI:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    path: ./providers/rule-provider_OpenAI.yaml
    interval: 86400
  SteamCN:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.yaml
    path: ./providers/rule-provider_SteamCN.yaml
    interval: 86400
  Netflix:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
    path: ./providers/rule-provider_Netflix.yaml
    interval: 86400
  Netflix_IP:
    type: http
    behavior: ipcidr
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix_IP.yaml
    path: ./providers/rule-provider_Netflix_IP.yaml
  proxy:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
    path: ./providers/rule-provider_proxy.yaml
    interval: 86400
  direct:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
    path: ./providers/rule-provider_direct.yaml
    interval: 86400
  lancidr:
    type: http
    behavior: ipcidr
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
    path: ./providers/rule-provider_lancidr.yaml
  cncidr:
    type: http
    behavior: ipcidr
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
    path: ./providers/rule-provider_cncidr.yaml
  telegramcidr:
    type: http
    behavior: ipcidr
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
    path: ./providers/rule-provider_telegramcidr.yaml
  
